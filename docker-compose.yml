# Drug Safety Signal Agent — fully local stack
# Requirements: Docker Desktop with Model Runner enabled
# Usage: docker compose up -d
# Then: uv run python main.py semaglutide

models:
  gemma4:
    model: ai/gemma4:E4B   # ~4GB download on first run, cached after

services:
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-Pharma@2024!}
      - plugins.security.disabled=false
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      # Enable ML Commons for DataDistributionTool, LogPatternAnalysisTool,
      # ScratchPad, Agentic Memory (all available in 3.3.0+)
      - plugins.ml_commons.only_run_on_ml_node=false
      - plugins.ml_commons.allow_registering_model_via_url=true
      - plugins.ml_commons.memory_feature_enabled=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u admin:${OPENSEARCH_PASSWORD:-Pharma@2024!} -k https://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-Pharma@2024!}
    depends_on:
      opensearch:
        condition: service_healthy

  # OpenSearch MCP Server — exposes SearchIndexTool, DataDistributionTool,
  # LogPatternAnalysisTool, GenericOpenSearchApiTool to the investigator agent
  opensearch-mcp:
    image: python:3.12-slim
    command: >
      sh -c "pip install -q opensearch-mcp-server-py &&
             opensearch-mcp-server-py --mode single --transport streamable-http --port 8001"
    environment:
      - OPENSEARCH_URL=https://opensearch:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-Pharma@2024!}
      - OPENSEARCH_SSL_VERIFY=false
      - OPENSEARCH_ENABLED_CATEGORIES=skills
    ports:
      - "8001:8001"
    depends_on:
      opensearch:
        condition: service_healthy

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      - PHOENIX_WORKING_DIR=/phoenix

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENSEARCH_URL=https://opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-Pharma@2024!}
      - OPENSEARCH_MCP_URL=http://opensearch-mcp:8001
      - PHOENIX_URL=http://phoenix:6006
      - LOCAL_MODEL_URL=http://model-runner.docker.internal/engines/llama.cpp/v1
    depends_on:
      opensearch:
        condition: service_healthy
      phoenix:
        condition: service_started
    models:
      - gemma4

volumes:
  opensearch_data:
